<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knowledge OS</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/theme.js"></script>
</head>
<body>
  <header>
    <h1><span class="dot">◆</span> Knowledge OS</h1>
    <span class="tag">problems · claims · evidence · open questions</span>
    <span class="spacer"></span>
    <input id="search" placeholder="search claims across all problems…" />
    <button id="themeBtn" class="iconbtn" onclick="toggleTheme()" title="Toggle light / dark">🌙</button>
  </header>

  <main>
    <aside>
      <div class="sec">Problems</div>
      <div id="problems"></div>
      <div class="sec" style="margin-top:18px">Model</div>
      <div style="font-size:11.5px;color:var(--muted);padding:0 6px;line-height:1.6">
        Storage atom = <b style="color:var(--ink)">Claim</b>.<br/>
        Problems, timelines &amp; ledgers are <b style="color:var(--ink)">computed</b>, never stored.
      </div>
    </aside>

    <section class="content">
      <div class="phead" id="phead"></div>
      <div class="tabs" id="tabs"></div>
      <div class="view" id="view"></div>
    </section>
  </main>

  <div id="drawer"><span class="x" onclick="closeDrawer()">✕</span><div id="drawerBody"></div></div>

  <script src="/static/app.js"></script>
</body>
</html>
